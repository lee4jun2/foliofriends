<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>FolioFriends · 주식 포트폴리오 공유</title>
  <meta name="description" content="국내·미국 주식 자산을 관리하고 친구들과 포트폴리오를 비중만 공유하는 앱">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app"></div>

  <!-- OCR (Tesseract.js) — 브라우저 내 실행, 무료/온디바이스 -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
  <script src="./ocr-parse.js" defer></script>

  <!-- Firebase (구글 로그인 + Realtime Database) — compat SDK, 빌드 불필요 -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js" defer></script>
  <script src="./firebase-config.js" defer></script>
  <script src="./auth.js" defer></script>
  <script src="./db.js" defer></script>

  <script src="./app.js" defer></script>
</body>
</html>
