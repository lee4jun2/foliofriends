name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 장중 시세 갱신: 15분마다 재배포(prices.json 새로 생성). 공개 repo는 Actions 무료/무제한.
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 실시간 시세 생성 (Yahoo Finance, 서버사이드 → CORS 무관)
      - name: Fetch live prices → prices.json
        run: node scripts/fetch-prices.mjs

      # Firebase 웹 config를 GitHub Secrets에서 생성 (소스에는 두지 않음)
      - name: Generate firebase-config.js from secrets
        run: |
          cat > firebase-config.js <<EOF
          // 이 파일은 배포 시 GitHub Secrets에서 자동 생성됩니다. 직접 수정하지 마세요.
          window.FIREBASE_CONFIG = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            databaseURL: '${{ secrets.FIREBASE_DATABASE_URL }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}',
            measurementId: '${{ secrets.FIREBASE_MEASUREMENT_ID }}',
            telegramBotToken: '${{ secrets.TELEGRAM_BOT_TOKEN }}',
            telegramChatId: '${{ secrets.TELEGRAM_CHAT_ID }}',
            geminiApiKey: '${{ secrets.GEMINI_API_KEY }}',
            fcmVapidKey: '${{ secrets.FCM_VAPID_KEY }}',
            pushWorkerUrl: '${{ secrets.PUSH_WORKER_URL }}',
          };
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
